<svg width="100%" viewBox="0 0 680 580" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<!-- OLED SSD1306 (top) -->
<rect x="205" y="18" width="270" height="90" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#0C447C" x="340" y="50" text-anchor="middle" dominant-baseline="central">OLED SSD1306</text>
<text font-size="12" fill="#185FA5" x="340" y="74" text-anchor="middle" dominant-baseline="central">128x64 · I2C</text>
<text font-size="12" fill="#185FA5" x="340" y="92" text-anchor="middle" dominant-baseline="central">VCC · GND · SDA · SCL</text>

<!-- ESP32-S3 (center) -->
<rect x="195" y="180" width="290" height="190" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#3C3489" x="340" y="220" text-anchor="middle" dominant-baseline="central">ESP32-S3 N16R8</text>
<text font-size="12" fill="#534AB7" x="340" y="248" text-anchor="middle" dominant-baseline="central">16MB Flash · 8MB PSRAM</text>
<text font-size="12" fill="#534AB7" x="268" y="278" text-anchor="middle" dominant-baseline="central">GPIO 4/5/6</text>
<text font-size="12" fill="#534AB7" x="412" y="278" text-anchor="middle" dominant-baseline="central">GPIO 7/15/16</text>
<text font-size="12" fill="#534AB7" x="340" y="308" text-anchor="middle" dominant-baseline="central">GPIO 41 · GPIO 42</text>
<text font-size="12" fill="#534AB7" x="340" y="334" text-anchor="middle" dominant-baseline="central">3V3 · GND</text>
<text font-size="12" fill="#534AB7" x="340" y="354" text-anchor="middle" dominant-baseline="central">GPIO 0 · GPIO 39 · GPIO 40</text>

<!-- INMP441 (left) -->
<rect x="10" y="170" width="148" height="175" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#085041" x="84" y="205" text-anchor="middle" dominant-baseline="central">INMP441</text>
<text font-size="12" fill="#0F6E56" x="84" y="228" text-anchor="middle" dominant-baseline="central">MEMS mic · I2S</text>
<text font-size="12" fill="#0F6E56" x="84" y="256" text-anchor="middle" dominant-baseline="central">VDD → 3V3</text>
<text font-size="12" fill="#0F6E56" x="84" y="276" text-anchor="middle" dominant-baseline="central">GND → GND</text>
<text font-size="12" fill="#0F6E56" x="84" y="296" text-anchor="middle" dominant-baseline="central">WS → GPIO 4</text>
<text font-size="12" fill="#0F6E56" x="84" y="316" text-anchor="middle" dominant-baseline="central">SCK → GPIO 5</text>
<text font-size="12" fill="#0F6E56" x="84" y="336" text-anchor="middle" dominant-baseline="central">SD → GPIO 6</text>

<!-- MAX98357A (right) -->
<rect x="522" y="60" width="148" height="210" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#712B13" x="596" y="95" text-anchor="middle" dominant-baseline="central">MAX98357A</text>
<text font-size="12" fill="#993C1D" x="596" y="118" text-anchor="middle" dominant-baseline="central">I2S amp · Class-D</text>
<text font-size="12" fill="#993C1D" x="596" y="146" text-anchor="middle" dominant-baseline="central">VIN → 3V3</text>
<text font-size="12" fill="#993C1D" x="596" y="166" text-anchor="middle" dominant-baseline="central">GND → GND</text>
<text font-size="12" fill="#993C1D" x="596" y="186" text-anchor="middle" dominant-baseline="central">DIN → GPIO 7</text>
<text font-size="12" fill="#993C1D" x="596" y="206" text-anchor="middle" dominant-baseline="central">BCLK → GPIO 15</text>
<text font-size="12" fill="#993C1D" x="596" y="226" text-anchor="middle" dominant-baseline="central">LRC → GPIO 16</text>
<text font-size="12" fill="#993C1D" x="596" y="246" text-anchor="middle" dominant-baseline="central">SD shorts VIN</text>

<!-- Speaker (bottom right) -->
<rect x="522" y="415" width="148" height="90" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#633806" x="596" y="448" text-anchor="middle" dominant-baseline="central">Speaker</text>
<text font-size="12" fill="#854F0B" x="596" y="470" text-anchor="middle" dominant-baseline="central">8Ω · 1W</text>
<text font-size="12" fill="#854F0B" x="596" y="490" text-anchor="middle" dominant-baseline="central">+ / −</text>

<!-- Buttons (bottom left) -->
<rect x="10" y="430" width="148" height="110" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#444441" x="84" y="460" text-anchor="middle" dominant-baseline="central">Buttons (opt.)</text>
<text font-size="12" fill="#5F5E5A" x="84" y="483" text-anchor="middle" dominant-baseline="central">GPIO 39 → Vol−</text>
<text font-size="12" fill="#5F5E5A" x="84" y="503" text-anchor="middle" dominant-baseline="central">GPIO 40 → Vol+</text>
<text font-size="12" fill="#5F5E5A" x="84" y="523" text-anchor="middle" dominant-baseline="central">GPIO 0 → Wake</text>

<!-- Wire: OLED to ESP32 -->
<line x1="340" y1="108" x2="340" y2="180" stroke="#378ADD" stroke-width="2" marker-end="url(#arrow)"/>
<text font-size="12" fill="#185FA5" x="352" y="148">SDA→41 · SCL→42</text>

<!-- Wire: INMP441 to ESP32 -->
<line x1="158" y1="270" x2="195" y2="265" stroke="#1D9E75" stroke-width="2" marker-end="url(#arrow)"/>
<text font-size="12" fill="#0F6E56" x="162" y="256">I2S in</text>

<!-- Wire: MAX98357A to ESP32 -->
<line x1="522" y1="230" x2="485" y2="260" stroke="#D85A30" stroke-width="2" marker-end="url(#arrow)"/>
<text font-size="12" fill="#993C1D" x="490" y="222">I2S out</text>

<!-- Wire: MAX98357A to Speaker -->
<line x1="596" y1="270" x2="596" y2="415" stroke="#BA7517" stroke-width="2" marker-end="url(#arrow)"/>
<text font-size="12" fill="#854F0B" x="610" y="345">OUT+ / OUT−</text>

<!-- Wire: Buttons to ESP32 (dashed) -->
<path d="M84 430 L84 390 L195 380" fill="none" stroke="#888780" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
<text font-size="12" fill="#5F5E5A" x="120" y="378">GPIO 0/39/40</text>

<!-- Legend -->
<line x1="20" y1="565" x2="50" y2="565" stroke="#378ADD" stroke-width="2"/>
<text font-size="12" fill="#185FA5" x="56" y="569">I2C (OLED)</text>
<line x1="150" y1="565" x2="180" y2="565" stroke="#1D9E75" stroke-width="2"/>
<text font-size="12" fill="#0F6E56" x="186" y="569">I2S mic</text>
<line x1="260" y1="565" x2="290" y2="565" stroke="#D85A30" stroke-width="2"/>
<text font-size="12" fill="#993C1D" x="296" y="569">I2S amp</text>
<line x1="370" y1="565" x2="400" y2="565" stroke="#BA7517" stroke-width="2"/>
<text font-size="12" fill="#854F0B" x="406" y="569">Audio out</text>
<line x1="490" y1="565" x2="520" y2="565" stroke="#888780" stroke-width="1.5" stroke-dasharray="5 3"/>
<text font-size="12" fill="#5F5E5A" x="526" y="569">GPIO (buttons)</text>
</svg>
